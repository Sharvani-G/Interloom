<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLoom Talent Matching Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #ec4899;
      --accent: #10b981;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 2rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 1.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(to right, #a5b4fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 2rem;
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .panel-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-main);
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 0.75rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input, select, textarea {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    button {
      background: linear-gradient(to right, var(--primary), var(--primary-hover));
      border: none;
      color: white;
      padding: 0.75rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }

    .tab-container {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tab {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
    }

    .score-tag {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
      border: 1px solid rgba(99, 102, 241, 0.4);
      color: #c7d2fe;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #e2e8f0;
    }

    .tag.required {
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.08);
      color: #fca5a5;
    }

    .log-item {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.4);
      border-left: 3px solid var(--primary);
      font-family: monospace;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .log-item.success {
      border-left-color: var(--accent);
    }

    .log-item.error {
      border-left-color: var(--secondary);
    }
  </style>
</head>
<body>

  <header>
    <h1><span>🕸️</span> InternLoom Dashboard</h1>
    <div class="status-badge" id="api-status">
      <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#10b981;"></span>
      Backend Server Active
    </div>
  </header>

  <main>
    <!-- Left panel - Authentication & Simulation Control -->
    <div class="panel">
      <div class="panel-title">Simulation Panel</div>
      
      <div class="form-group">
        <label for="sim-role">Actor Role</label>
        <select id="sim-role">
          <option value="student">Student (Alice Smith)</option>
          <option value="company">Company (Seeded Tech)</option>
          <option value="admin">Administrator (Audit Logs)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="jwt-token">Bearer Auth Token</label>
        <input type="text" id="jwt-token" placeholder="Paste login token here...">
      </div>

      <button id="btn-login-demo">Login with Seeded Data</button>
      <button id="btn-clear-token" class="btn-secondary">Clear Session</button>

      <div class="panel-title">Console Output</div>
      <div id="sim-logs" style="max-height: 250px; overflow-y: auto;">
        <div class="log-item success">Ready to simulate. Choose a role and log in.</div>
      </div>
    </div>

    <!-- Right panel - Main Display Workspace -->
    <div class="panel">
      <div class="tab-container">
        <div class="tab active" id="tab-listings">Job Listings (Student View)</div>
        <div class="tab" id="tab-notifications">My Notifications</div>
        <div class="tab" id="tab-audit">Audit Trails (Admin)</div>
      </div>

      <div id="tab-content">
        <!-- Dynamic content will load here -->
        <div class="card-list" id="content-list">
          <div style="text-align: center; color: var(--text-muted); padding: 3rem;">
            Loading listings details...
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const simRole = document.getElementById("sim-role");
    const jwtTokenInput = document.getElementById("jwt-token");
    const btnLoginDemo = document.getElementById("btn-login-demo");
    const btnClearToken = document.getElementById("btn-clear-token");
    const simLogs = document.getElementById("sim-logs");
    
    const tabListings = document.getElementById("tab-listings");
    const tabNotifications = document.getElementById("tab-notifications");
    const tabAudit = document.getElementById("tab-audit");
    const contentList = document.getElementById("content-list");

    let currentToken = localStorage.getItem("loom_token") || "";
    jwtTokenInput.value = currentToken;

    function addLog(message, type = "success") {
      const log = document.createElement("div");
      log.className = `log-item ${type}`;
      log.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
      simLogs.appendChild(log);
      simLogs.scrollTop = simLogs.scrollHeight;
    }

    async function loginDemoUser() {
      const role = simRole.value;
      let email = "alice@university.edu";
      let password = "Password123!";

      if (role === "company") {
        email = "recruitment@seededtech.com";
      } else if (role === "admin") {
        currentToken = "admin-super-secret-token";
        jwtTokenInput.value = currentToken;
        localStorage.setItem("loom_token", currentToken);
        addLog("Logged in as Admin (mock token set).", "success");
        loadActiveTab();
        return;
      }

      try {
        addLog(`Attempting demo login for ${email}...`);
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          currentToken = data.data.accessToken;
          jwtTokenInput.value = currentToken;
          localStorage.setItem("loom_token", currentToken);
          addLog("Logged in successfully. Token cached.", "success");
          loadActiveTab();
        } else {
          addLog(`Login failed: ${data.error.message}`, "error");
        }
      } catch (err) {
        addLog(`Connection error: ${err.message}`, "error");
      }
    }

    // Switch Tabs
    const tabs = [tabListings, tabNotifications, tabAudit];
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        loadActiveTab();
      });
    });

    function loadActiveTab() {
      const activeTabId = document.querySelector(".tab.active").id;
      if (activeTabId === "tab-listings") {
        loadListings();
      } else if (activeTabId === "tab-notifications") {
        loadNotifications();
      } else if (activeTabId === "tab-audit") {
        loadAuditLogs();
      }
    }

    async function loadListings() {
      contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">Loading job listings...</div>`;
      try {
        const headers = {};
        if (currentToken) {
          headers["Authorization"] = `Bearer ${currentToken}`;
        }
        // Call student listings
        const res = await fetch("/api/listings?sortBy=match", { headers });
        const data = await res.json();
        
        if (data.success) {
          const list = data.data;
          if (list.length === 0) {
            contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">No active listings found.</div>`;
            return;
          }
          contentList.innerHTML = list.map(item => `
            <div class="card">
              <div class="card-header">
                <div>
                  <div class="card-title">${item.title}</div>
                  <div class="card-meta">
                    <span>🏢 ${item.companyName}</span>
                    <span>📍 ${item.location}</span>
                    <span>💰 $${item.stipend}/mo</span>
                  </div>
                </div>
                ${item.matchScore !== undefined ? `<div class="score-tag">Match: ${item.matchScore}%</div>` : ""}
              </div>
              <div>${item.description}</div>
              <div class="card-header" style="align-items: center;">
                <div class="tags">
                  ${item.skills.map(s => `<span class="tag ${s.isRequired ? 'required' : ''}">${s.name}${s.isRequired ? ' *' : ''}</span>`).join('')}
                </div>
                <button onclick="applyJob('${item.id}')" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Apply Now</button>
              </div>
            </div>
          `).join('');
        } else {
          contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--secondary)">Error loading listings: ${data.error.message} (Role must be Student)</div>`;
        }
      } catch (err) {
        contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--secondary)">Connection failed: ${err.message}</div>`;
      }
    }

    async function applyJob(listingId) {
      if (!currentToken) {
        addLog("Authentication token missing. Log in as Student first.", "error");
        return;
      }
      try {
        addLog(`Applying to job listing ${listingId}...`);
        const res = await fetch(`/api/listings/${listingId}/apply`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${currentToken}`,
            "Content-Type": "application/json"
          }
        });
        const data = await res.json();
        if (data.success) {
          addLog("Application submitted successfully!", "success");
          loadListings();
        } else {
          addLog(`Application failed: ${data.error.message}`, "error");
        }
      } catch (err) {
        addLog(`Network error: ${err.message}`, "error");
      }
    }

    async function loadNotifications() {
      contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">Loading notifications...</div>`;
      if (!currentToken) {
        contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">Token missing. Please log in first.</div>`;
        return;
      }
      try {
        const res = await fetch("/api/notifications", {
          headers: { "Authorization": `Bearer ${currentToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
          const list = data.data;
          if (list.length === 0) {
            contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">No notifications logs.</div>`;
            return;
          }
          contentList.innerHTML = `
            <button onclick="markAllNotificationsRead()" class="btn-secondary" style="margin-bottom:1rem; padding:0.4rem 1rem; align-self:flex-start;">Mark All Read</button>
            <div class="card-list">
              ${list.map(n => `
                <div class="card" style="opacity: ${n.isRead ? '0.6' : '1'}; border-left: 4px solid ${n.isRead ? 'var(--text-muted)' : 'var(--primary)'}">
                  <div style="font-weight:600; display:flex; justify-content:space-between;">
                    <span>${n.type}</span>
                    <span style="font-size:0.8rem; color:var(--text-muted); font-weight:400;">${new Date(n.createdAt).toLocaleDateString()}</span>
                  </div>
                  <div>${n.message}</div>
                  ${!n.isRead ? `<button onclick="markNotificationRead('${n.id}')" style="padding:0.25rem 0.75rem; font-size:0.8rem; align-self:flex-end;">Mark Read</button>` : ""}
                </div>
              `).join('')}
            </div>
          `;
        } else {
          contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--secondary)">Error: ${data.error.message}</div>`;
        }
      } catch (err) {
        contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--secondary)">Connection failed: ${err.message}</div>`;
      }
    }

    async function markNotificationRead(id) {
      try {
        const res = await fetch(`/api/notifications/${id}/read`, {
          method: "PATCH",
          headers: { "Authorization": `Bearer ${currentToken}` }
        });
        if (res.ok) {
          addLog("Notification marked read.", "success");
          loadNotifications();
        }
      } catch (err) {
        addLog(err.message, "error");
      }
    }

    async function markAllNotificationsRead() {
      try {
        const res = await fetch(`/api/notifications/bulk-read`, {
          method: "PATCH",
          headers: { "Authorization": `Bearer ${currentToken}` }
        });
        if (res.ok) {
          addLog("All notifications marked read.", "success");
          loadNotifications();
        }
      } catch (err) {
        addLog(err.message, "error");
      }
    }

    async function loadAuditLogs() {
      contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">Loading system audit logs...</div>`;
      const adminToken = currentToken || "admin-super-secret-token";
      try {
        const res = await fetch("/api/audit", {
          headers: { "Authorization": `Bearer ${adminToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
          const list = data.data;
          if (list.length === 0) {
            contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">No audit logs recorded yet.</div>`;
            return;
          }
          contentList.innerHTML = list.map(log => `
            <div class="card" style="font-family:monospace; font-size:0.9rem;">
              <div style="font-weight:bold; color:var(--accent)">[${log.action}]</div>
              <div style="color:var(--text-muted)">Actor: ${log.actorType} (${log.actorId})</div>
              <div>Resource: ${log.resourceType} (${log.resourceId})</div>
              <div style="font-size:0.75rem; color:var(--text-muted)">Timestamp: ${log.createdAt}</div>
              ${log.beforeState ? `<div style="color:#f87171; font-size:0.8rem; white-space:pre-wrap;">- Before: ${JSON.stringify(log.beforeState)}</div>` : ""}
              ${log.afterState ? `<div style="color:#4ade80; font-size:0.8rem; white-space:pre-wrap;">+ After: ${JSON.stringify(log.afterState)}</div>` : ""}
            </div>
          `).join('');
        } else {
          contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--secondary)">Error loading audit logs: ${data.error.message} (Requires 'admin-super-secret-token' or Admin Auth Header)</div>`;
        }
      } catch (err) {
        contentList.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--secondary)">Connection failed: ${err.message}</div>`;
      }
    }

    btnLoginDemo.addEventListener("click", loginDemoUser);
    btnClearToken.addEventListener("click", () => {
      currentToken = "";
      jwtTokenInput.value = "";
      localStorage.removeItem("loom_token");
      addLog("Session cleared.", "success");
      loadActiveTab();
    });

    jwtTokenInput.addEventListener("input", (e) => {
      currentToken = e.target.value;
      localStorage.setItem("loom_token", currentToken);
      loadActiveTab();
    });

    // Initial load
    loadActiveTab();
  </script>
</body>
</html>
